spring.application.name=car-service
# Render tự động cấp phát Port, dùng biến ${PORT} để tránh lỗi sập server
server.port=${PORT:5002}

# ==========================================
# CẤU HÌNH DATABASE NEON (Trỏ vào cardb)
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-weathered-river-ap9qvafu.c-7.us-east-1.aws.neon.tech/cardb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_IXH8k0TNxFKB}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# ACTUATOR - HEALTH CHECK
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==========================================
# FLYWAY - DATABASE MIGRATION
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.validate-on-migrate=true

# ==========================================
# KAFKA CLOUD CONFIGURATION (AIVEN)
# ==========================================
spring.kafka.bootstrap-servers=${KAFKA_URL:kafka-294de6a9-bui452893-c7d1.h.aivencloud.com:11303}

spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
# LƯU Ý: Thay chuỗi MẬT_KHẨU_CỦA_BẠN bằng password thực tế bạn lấy được trên Aiven
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USERNAME:avnadmin}" password="${AVNS_O6r81wD9PKs0tcup07T}";

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ==========================================
# JWT SECURITY
# ==========================================
jwt.secret=jwt.secret=my_super_secret_key_my_super_secret_key_123456
