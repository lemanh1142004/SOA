# Render tự động cấp phát Port, dùng biến ${PORT} để tránh lỗi sập server
server.port=${PORT:8080}
spring.application.name=gateway-api

# ==========================================
# CẤU HÌNH ROUTES ĐẾN CÁC MICROSERVICES
# ==========================================
# 1. Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:https://authservice-s93f.onrender.com}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/auth/(?<segment>.*), /auth/$\{segment}

# 2. Car Service
spring.cloud.gateway.routes[1].id=car-service
spring.cloud.gateway.routes[1].uri=${CAR_SERVICE_URL:https://carservice-071u.onrender.com}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cars,/api/cars/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/cars(?<segment>/?.*), /cars$\{segment}

# 3. AI Service
spring.cloud.gateway.routes[2].id=ai-service
spring.cloud.gateway.routes[2].uri=${AI_SERVICE_URL:https://aiservice-7rlg.onrender.com}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/ai,/api/ai/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/ai/?(?<segment>.*), /$\{segment}

# ==========================================
# CẤU HÌNH CORS (BẢO MẬT GIAO TIẾP VỚI FRONTEND)
# ==========================================
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=https://frontend-fx0c.onrender.com

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ==========================================
# RATE LIMITING
# ==========================================
resilience4j.ratelimiter.instances.api-limiter.registerHealthIndicator=true
resilience4j.ratelimiter.instances.api-limiter.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.api-limiter.limitForPeriod=100
resilience4j.ratelimiter.instances.api-limiter.timeoutDuration=5s

# ==========================================
# CIRCUIT BREAKER
# ==========================================
resilience4j.circuitbreaker.instances.api-breaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.api-breaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.api-breaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.api-breaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.api-breaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.api-breaker.waitDurationInOpenState=10s

# ==========================================
# ACTUATOR - HEALTH CHECK
# ==========================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true