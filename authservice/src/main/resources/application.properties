# Render tự động cấp phát Port, nên cần để biến môi trường ${PORT} lên trước
server.port=${PORT:5001}

# ==========================================
# CẤU HÌNH DATABASE NEON
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-weathered-river-ap9qvafu.c-7.us-east-1.aws.neon.tech/ai_car_db?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_IXH8k0TNxFKB}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# ACTUATOR - HEALTH CHECK (Dùng cho Render theo dõi trạng thái app)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==========================================
# FLYWAY - DATABASE MIGRATION
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.validate-on-migrate=true

# ==========================================
# JWT SECURITY
# ==========================================
jwt.secret=my_super_secret_key_my_super_secret_key_123456
# Sửa Access Token xuống 15 phút (900000 ms)
jwt.expiration=900000
# Thêm thời gian sống cho Refresh Token là 7 ngày (604800000 ms)
jwt.refresh-expiration=604800000